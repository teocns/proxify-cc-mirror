name: Deploy Mintlify Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Mintlify
        uses: mintlify/action@v1
        with:
          version: 3
          mintlify-api-key: ${{ secrets.MINTLIFY_API_KEY }}
